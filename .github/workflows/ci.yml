name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: nevis
          POSTGRES_USER: nevis
          POSTGRES_PASSWORD: nevis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nevis -d nevis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://nevis:nevis@localhost:5432/nevis
      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_PROVIDER: fake
      EMBEDDING_DIMENSION: "384"
      ENABLE_SUMMARY: "false"
      RUN_DB_TESTS: "1"
      SEARCH_RESULT_LIMIT: "10"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: python -m pytest

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy app
