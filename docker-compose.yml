services:
  api:
    build:
      context: .
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://nevis:nevis@postgres:5432/nevis
      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_PROVIDER: fake
      EMBEDDING_DIMENSION: "384"
      ENABLE_SUMMARY: "false"
      RUN_DB_TESTS: "1"
      SEARCH_RESULT_LIMIT: "10"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nevis
      POSTGRES_USER: nevis
      POSTGRES_PASSWORD: nevis
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nevis -d nevis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
